name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ==========================================================================
  # BACKEND CI: Python FastAPI Server
  # ==========================================================================
  backend:
    name: Backend Tests & Linting
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov black flake8 mypy

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Format check with black
        run: |
          black --check . --line-length=120

      - name: Type check with mypy
        run: |
          mypy . --ignore-missing-imports --show-error-codes || true

      - name: Run tests
        run: |
          pytest . -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./server/coverage.xml
          flags: backend
          name: backend-coverage

  # ==========================================================================
  # EXTENSION CI: JavaScript/TypeScript Linting & Build
  # ==========================================================================
  extension:
    name: Extension Linting & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm install || npm ci

      - name: Check for linting (if eslint configured)
        run: |
          if [ -f ".eslintrc.json" ] || [ -f ".eslintrc.js" ]; then
            npm run lint || true
          else
            echo "ESLint not configured, skipping..."
          fi

      - name: Check for build issues
        run: |
          if [ -f "package.json" ]; then
            npm run build 2>&1 || echo "No build script configured"
          fi

      - name: Validate manifest.json
        run: |
          python3 << 'EOF'
          import json
          with open('manifest.json', 'r') as f:
            manifest = json.load(f)
          print("✓ manifest.json is valid")
          print(f"  Name: {manifest.get('name')}")
          print(f"  Version: {manifest.get('version')}")
          print(f"  Permissions: {len(manifest.get('permissions', []))} permissions")
          EOF

  # ==========================================================================
  # DOCKER BUILD: Verify Docker builds work
  # ==========================================================================
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build server image
        uses: docker/build-push-action@v4
        with:
          context: ./server
          push: false
          tags: webpilot-server:test
          file: ./server/Dockerfile
        continue-on-error: true

  # ==========================================================================
  # SECURITY: Basic security checks
  # ==========================================================================
  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Check Python dependencies vulnerabilities with safety
        working-directory: server
        run: |
          safety check --json || true

      - name: Run bandit security scan on Python code
        working-directory: server
        run: |
          bandit -r . -f json -o /tmp/bandit-report.json || true
          echo "Bandit scan complete (non-blocking)"

  # ==========================================================================
  # STATUS: Final CI status
  # ==========================================================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [backend, extension, docker, security]
    if: always()

    steps:
      - name: Check CI results
        run: |
          echo "Backend: ${{ needs.backend.result }}"
          echo "Extension: ${{ needs.extension.result }}"
          echo "Docker: ${{ needs.docker.result }}"
          echo "Security: ${{ needs.security.result }}"

          if [[ "${{ needs.backend.result }}" == "failure" || "${{ needs.extension.result }}" == "failure" ]]; then
            echo "❌ CI pipeline failed"
            exit 1
          fi
          echo "✅ CI pipeline passed"
