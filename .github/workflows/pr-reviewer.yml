name: PR Reviewer

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run GitHub Copilot Review
        uses: github/copilot-review@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
