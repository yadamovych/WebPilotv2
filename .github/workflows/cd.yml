name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  push:
    tags:
      - "v*.*.*"

# Cancel in-progress CD runs for the same ref (e.g. rapid pushes to main)
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Required repo variables  (Settings → Secrets & Variables → Actions):
#
#   Variables (non-secret):
#     AWS_REGION          e.g. us-east-1
#     ECR_REPOSITORY      e.g. webpilot-server   (repo name, not full URI)
#     ECS_CLUSTER         e.g. webpilot-cluster
#     ECS_SERVICE         e.g. webpilot-service
#     ECS_TASK_DEFINITION e.g. webpilot-task     (family name, not ARN)
#     CONTAINER_NAME      e.g. webpilot-server   (name inside the task def)
#
#   Secrets:
#     AWS_ROLE_TO_ASSUME  ARN of the IAM role to assume via OIDC
#                         (preferred — no long-lived keys)
#
# ---------------------------------------------------------------------------
# IAM trust policy for the OIDC role must allow:
#   "token.actions.githubusercontent.com" as the federated principal
#   with condition StringLike "sub": "repo:<owner>/<repo>:ref:refs/heads/main"
#
# IAM permissions needed:
#   ecr:GetAuthorizationToken
#   ecr:BatchGetImage / BatchCheckLayerAvailability / PutImage / ...
#   ecs:RegisterTaskDefinition / DescribeTaskDefinition
#   ecs:UpdateService / DescribeServices
#   iam:PassRole  (for the ECS task execution role)
# ---------------------------------------------------------------------------

env:
  AWS_REGION:      ${{ vars.AWS_REGION }}
  ECR_REPOSITORY:  ${{ vars.ECR_REPOSITORY }}
  # When triggered by workflow_run, use the triggering commit SHA
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  # ==========================================================================
  # GATE: Abort if CI did not succeed (only relevant for workflow_run trigger)
  # ==========================================================================
  ci-gate:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Fail if CI was not successful
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'success' }}
        run: |
          echo "CI conclusion: ${{ github.event.workflow_run.conclusion }}"
          exit 1
      - name: CI passed
        run: echo "CI passed — proceeding with CD"

  # ==========================================================================
  # BUILD & PUSH: Docker image → Amazon ECR
  # ==========================================================================
  build-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: ci-gate
    permissions:
      contents: read
      id-token: write   # required for OIDC

    outputs:
      image-uri: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ECR
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          # Tag with both :latest and the short commit SHA for traceability
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${{ env.DEPLOY_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Expose the full image URI (with digest) for the deploy job
      - name: Export image URI
        id: image-uri
        run: |
          echo "image=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}" \
            >> $GITHUB_OUTPUT

  # ==========================================================================
  # DEPLOY: Update ECS task definition → rolling deploy
  # ==========================================================================
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-push
    # For workflow_run trigger: check the triggering branch; for tag push: always deploy
    if: |
      github.event.workflow_run.head_branch == 'main' ||
      startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Download the current task definition JSON so we only patch the image
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars.ECS_TASK_DEFINITION }} \
            --query taskDefinition \
            > task-definition.json

      # Replace the image URI for our container inside the task definition
      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ vars.CONTAINER_NAME }}
          image: >-
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${{ env.DEPLOY_SHA }}

      # Register the new revision and update the service (rolling deploy)
      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          # Wait until the new task is healthy before marking the job green
          wait-for-service-stability: true

  # ==========================================================================
  # NOTIFY: Job summary
  # ==========================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build-push, deploy]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "### CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Push (ECR) | ${{ needs.build-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy (ECS) | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Cluster: \`${{ vars.ECS_CLUSTER }}\`  Service: \`${{ vars.ECS_SERVICE }}\`" >> $GITHUB_STEP_SUMMARY
